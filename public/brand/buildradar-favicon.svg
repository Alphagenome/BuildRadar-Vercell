<?xml version="1.0" encoding="UTF-8"?>
<!--
  BuildRadar — Favicon (32×32)
  Minimalist Pulse: 4 spindles, 8 tips, flat colours
  Maximum legibility at browser-tab size
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BuildRadar">
  <rect width="32" height="32" fill="#0A1628"/>
  <g transform="translate(16,16)">
    <ellipse rx="1" ry="13" fill="#D4AF37" transform="rotate(0)"/>
    <ellipse rx="1" ry="13" fill="#C0C0C0" transform="rotate(45)"/>
    <ellipse rx="1" ry="13" fill="#D4AF37" transform="rotate(90)"/>
    <ellipse rx="1" ry="13" fill="#C0C0C0" transform="rotate(135)"/>
    <circle r="2" fill="#FFFFFF"/>
  </g>
</svg>
