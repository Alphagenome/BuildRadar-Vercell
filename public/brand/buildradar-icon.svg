<?xml version="1.0" encoding="UTF-8"?>
<!--
  BuildRadar — Primary Icon
  16-needle radar burst. Three-tier compass hierarchy:
    N/E/S/W gold  — longest  (r 15→75)
    NE/SE/SW/NW gold — medium (r 30→75)
    Silver          — shortest (r 45→75)
  All outer tips share the same imaginary circle at r=75.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="BuildRadar">
  <defs>
    <radialGradient id="rg-gold" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5D060"/>
      <stop offset="60%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg-silver" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="60%"  stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg-dot">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="#0A1628"/>

  <g transform="translate(100,100)">
    <g transform="rotate(0)">    <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#rg-gold)"/></g>
    <g transform="rotate(22.5)"> <ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(45)">   <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#rg-gold)"/></g>
    <g transform="rotate(67.5)"> <ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(90)">   <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#rg-gold)"/></g>
    <g transform="rotate(112.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(135)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#rg-gold)"/></g>
    <g transform="rotate(157.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(180)">  <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#rg-gold)"/></g>
    <g transform="rotate(202.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(225)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#rg-gold)"/></g>
    <g transform="rotate(247.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(270)">  <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#rg-gold)"/></g>
    <g transform="rotate(292.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <g transform="rotate(315)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#rg-gold)"/></g>
    <g transform="rotate(337.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#rg-silver)"/></g>
    <circle r="5" fill="url(#rg-dot)"/>
  </g>
</svg>
