<?xml version="1.0" encoding="UTF-8"?>
<!--
  BuildRadar — Horizontal Lockup (Navbar / Header)
  Icon left · BUILD RADAR + tagline right
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="BuildRadar">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=Montserrat&amp;display=swap');</style>
    <radialGradient id="hg-gold" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5D060"/>
      <stop offset="60%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hg-silver" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="60%"  stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hg-dot">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </radialGradient>
  </defs>

  <rect width="480" height="80" fill="#0A1628"/>

  <!-- Icon — scale 0.43 → outer radius 32px, centred at (42,40) -->
  <g transform="translate(42,40) scale(0.43)">
    <g transform="rotate(0)">    <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#hg-gold)"/></g>
    <g transform="rotate(22.5)"> <ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(45)">   <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#hg-gold)"/></g>
    <g transform="rotate(67.5)"> <ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(90)">   <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#hg-gold)"/></g>
    <g transform="rotate(112.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(135)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#hg-gold)"/></g>
    <g transform="rotate(157.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(180)">  <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#hg-gold)"/></g>
    <g transform="rotate(202.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(225)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#hg-gold)"/></g>
    <g transform="rotate(247.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(270)">  <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#hg-gold)"/></g>
    <g transform="rotate(292.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <g transform="rotate(315)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#hg-gold)"/></g>
    <g transform="rotate(337.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#hg-silver)"/></g>
    <circle r="5" fill="url(#hg-dot)"/>
  </g>

  <text x="86" y="36" text-anchor="start"
        font-family="Cinzel, Georgia, serif" font-weight="700" font-size="20"
        fill="#C0C0C0" letter-spacing="1">BUILD RADAR</text>

  <text x="86" y="56" text-anchor="start"
        font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="6.5"
        fill="#D4AF37" letter-spacing="1.8">CONSTRUCTION INTELLIGENCE YOU CAN TRUST</text>
</svg>
