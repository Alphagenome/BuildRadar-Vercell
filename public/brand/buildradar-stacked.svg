      <stop offset="100%" stop-color="#D4AF37"/>
    </radialGradient>
  </defs>

  <rect width="380" height="195" fill="#0A1628"/>

  <!-- Icon — scale 0.72 → outer radius 54px, centred at (190,76) -->
