    <g transform="rotate(112.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#sg-silver)"/></g>
    <g transform="rotate(135)">  <ellipse cx="0" cy="-52.5" rx="1.2" ry="22.5" fill="url(#sg-gold)"/></g>
    <g transform="rotate(157.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#sg-silver)"/></g>
    <g transform="rotate(180)">  <ellipse cx="0" cy="-45"   rx="1.2" ry="30"   fill="url(#sg-gold)"/></g>
    <g transform="rotate(202.5)"><ellipse cx="0" cy="-60"   rx="1.2" ry="15"   fill="url(#sg-silver)"/></g>
