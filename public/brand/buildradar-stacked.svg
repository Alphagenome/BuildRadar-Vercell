<?xml version="1.0" encoding="UTF-8"?>
<!--
  BuildRadar — Stacked Lockup (Primary)
  Icon centred top · BUILD RADAR · tagline
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 195" role="img" aria-label="BuildRadar">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=Montserrat&amp;display=swap');</style>
    <radialGradient id="sg-gold" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5D060"/>
      <stop offset="60%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sg-silver" cx="0" cy="0" r="75" gradientUnits="userSpaceOnUse">
